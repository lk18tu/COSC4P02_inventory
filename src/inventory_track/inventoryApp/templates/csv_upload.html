{% extends 'base.html' %}

{% block title %} Upload CSV for {{ table_name }} {% endblock %}

{% block content %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Upload CSV for Table: {{ table_name }}</h1>

        <!-- Download CSV Template -->
        <div class="mb-4">
            <h4>Download CSV Template</h4>
            <a href="{% url 'inventoryApp:download_template' table_name %}" class="btn btn-primary">
                <i class="bi bi-download"></i> Download Template
            </a>
        </div>

        <!-- Upload CSV Form -->
        <form method="post" enctype="multipart/form-data" class="border p-4 rounded shadow-sm">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="csv_file" class="form-label">Select CSV File:</label>
                <input type="file" class="form-control" id="csv_file" name="csv_file" accept=".csv" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Choose Upload Mode:</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="mode" id="overwrite" value="overwrite" checked>
                    <label class="form-check-label" for="overwrite">Overwrite existing data</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="mode" id="append" value="append">
                    <label class="form-check-label" for="append">Append to existing data</label>
                </div>
            </div>

            <button type="submit" class="btn btn-success">
                <i class="bi bi-upload"></i> Upload CSV
            </button>
            <a href="{% url 'inventoryApp:home' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
{% endblock %}
